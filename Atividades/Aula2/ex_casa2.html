<!DOCTYPE html>
<html lang="pt-br">
    <head>  
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exercícios (casa) - Introdução ao JavaScript</title>
        <style>
            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh; 
                align-items: center;
            }
            .container{
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: rgb(208, 157, 99);
                width: 500px;
                height: 250px;
                margin-top: 30px;
                text-align: center;
                
            }
            
            #texto-luz {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-weight: bold;
                font-size: 1.2rem;
                color: #333;
            }

        </style>
    </head>
    <body>
        <div class="container" >
            <h3> Desafio 1: O Interruptor</h3>
            <button id="button-luz" onclick="alternarLuz()"> Interruptor </button>
            <br>
            <span id="texto-luz">A luz está APAGADA</span>

        </div>
        <div class="container" >
            <h3> Desafio 2: O Multiplicador </h3>
            <br>
            <h1 id="valor">10</h1>
            <br>
            <button id="button-contador" onclick="aumentarContador()"> Dobrar </button>

            
        </div>
        <script>
            function alternarLuz(){
                let texto = document.querySelector('#texto-luz');
                if(texto.innerHTML === 'A luz está APAGADA'){
                    texto.innerHTML = `A luz está ACESA`;
                }
                else{
                    texto.innerHTML = `A luz está APAGADA`;
                }
            }
            function aumentarContador(){
                let valor = document.querySelector('#valor');
                let dobro  = 2 * (Number(valor.innerHTML));
                valor.innerHTML = dobro;
                if(dobro > 100){
                    alert(`Cuidador, o número ${dobro} está ficando muito grande`);
                }
            }
        </script>
        

    </body>
</html>
