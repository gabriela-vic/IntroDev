<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    </head>
<body>
    <h1>Criar Conta</h1>
    
    <div>
        <label>Nome:</label><br>
        <input type="text" id="nome_input"><br>
        
        <label>Senha:</label><br>
        <input type="password" id="senha_input"><br>
        
        <label>Bio:</label><br>
        <textarea id="bio_input"></textarea><br><br>
        
        <button onclick="enviarDados()">Finalizar Cadastro</button>
    </div>

    <script>
        async function enviarDados() {
            const dados = {
                nome: document.getElementById('nome_input').value,
                senha: document.getElementById('senha_input').value,
                bio: document.getElementById('bio_input').value
            };

            const resposta = await fetch('/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dados)
            });

            
            if (resposta.ok) {
                const resultado = await resposta.json();
                alert("Sucesso! Usuário " + resultado.usuario + " cadastrado.");
                window.location.href = "/login";
            } else {
                alert("Erro ao cadastrar. Verifique o terminal do Python.");
            }
        }
    </script>
</body>
</html>
