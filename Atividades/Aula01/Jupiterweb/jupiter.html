<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiterweb</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="main-header">
        <div class="header-top">
            <div class="logo-container">
                <a href="http://www.usp.br" target="_blank" class="logo-usp">
                    <img src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo.png" alt="Logo USP">
                </a>
                <a href="http://www.usp.br" target="_blank" class="logo-texto">
                    <img src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo-texto.png" alt="Universidade de São Paulo">
                </a>
            </div>
        </div>
        <div class="header-bar"></div>
    </header>
    
    <main class="conteudo">
        <nav class="menu"> 
            <div class="caixa-menu" id="menu-publico">
                <h3 class="menu-titulo"> Público </h3>
                <ul class="menu-conteudo">
                    <li> Calendário Escolar</li>
                    <li> Curso de ingresso</li>
                    <li> Disciplinas</li>
                    <li> Editais</li>
                    <li> FAQ </li>

                </ul>

            </div>
            <div class="caixa-menu" id="menu-restrito">
                <h3 class="menu-titulo"> Acesso restrito</h3>
                <ul class="menu-conteudo">

                </ul>
            </div>
            
        </nav>
        
            
        
        <section class="area-login">
            <form class="login-form" action="" method="POST">
                <h3>Login</h3>
                <input type="text" name="usuario" placeholder="Usuário" required>
                <input type="password" name="senha" placeholder="Senha" required>
                
                <button id="botao-entrar" type="submit">Entrar</button>
            </form>
        </section>


    </main>
    
    
    
    
    <footer class="main-footer">

    </footer>
</body>
</html>
